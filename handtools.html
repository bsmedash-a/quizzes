<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Tools & Bench Work Mastery Quiz</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #d35400;
            --accent-hover: #e67e22;
            --correct: #27ae60;
            --incorrect: #e74c3c;
            --text-main: #333;
            --text-light: #fff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Hamburger Menu Button */
        #hamburger-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: var(--primary);
            border: none;
            border-radius: 6px;
            padding: 12px;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            transition: 0.3s;
        }

        #hamburger-btn:hover {
            background-color: var(--accent);
        }

        #hamburger-btn div {
            width: 24px;
            height: 3px;
            background-color: var(--text-light);
            border-radius: 2px;
        }

        /* Sidebar Navigation */
        #sidebar {
            position: fixed;
            top: 0;
            left: -350px;
            width: 320px;
            height: 100vh;
            background-color: var(--primary);
            color: var(--text-light);
            transition: left 0.3s ease-in-out;
            z-index: 999;
            box-shadow: 2px 0 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        #sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 30px 20px 20px 20px;
            text-align: center;
            background-color: var(--secondary);
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 2px solid var(--accent);
            margin-top: 50px;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .nav-btn {
            background-color: var(--secondary);
            color: var(--text-light);
            border: 1px solid #4a6278;
            border-radius: 4px;
            padding: 10px 0;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-btn:hover { background-color: var(--accent); border-color: var(--accent); }
        .nav-btn.answered-correct { background-color: var(--correct); border-color: var(--correct); }
        .nav-btn.answered-incorrect { background-color: var(--incorrect); border-color: var(--incorrect); }
        .nav-btn.active { box-shadow: 0 0 0 3px #f1c40f; transform: scale(1.1); z-index: 2; }

        /* Main Quiz Container */
        .quiz-container {
            background-color: #fff;
            width: 92%;
            max-width: 800px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 40px;
            margin: 40px 0;
            position: relative;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
            font-size: 1.1rem;
            font-weight: bold;
            color: #7f8c8d;
        }

        .question-text {
            font-size: 1.25rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: var(--primary);
            font-weight: 600;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background-color: #f8f9fa;
            border: 2px solid #dcdde1;
            border-radius: 8px;
            padding: 16px 20px;
            font-size: 1.05rem;
            color: var(--text-main);
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }

        .option:hover:not(:disabled) {
            background-color: #e2e8f0;
            border-color: #b2bec3;
        }

        .option:disabled {
            cursor: not-allowed;
            opacity: 0.95;
        }

        .option.correct {
            background-color: var(--correct) !important;
            border-color: #219a52 !important;
            color: var(--text-light) !important;
        }

        .option.incorrect {
            background-color: var(--incorrect) !important;
            border-color: #a93226 !important;
            color: var(--text-light) !important;
        }

        .action-btn {
            background-color: var(--accent);
            color: var(--text-light);
            border: none;
            border-radius: 8px;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            width: 100%;
            transition: 0.2s;
            display: none;
        }

        .action-btn:hover { background-color: var(--accent-hover); }

        /* Results Screen */
        #results-screen {
            display: none;
            text-align: center;
        }

        #results-screen h1 { font-size: 2.8rem; color: var(--primary); margin-bottom: 15px; }
        #results-screen p { font-size: 1.3rem; color: #7f8c8d; margin-bottom: 30px; }
        
        .restart-btn {
            background-color: var(--correct);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .restart-btn:hover { background-color: #219a52; }

    </style>
</head>
<body>

    <button id="hamburger-btn" onclick="toggleSidebar()">
        <div></div><div></div><div></div>
    </button>

    <div id="sidebar">
        <div class="sidebar-header">Question Navigator</div>
        <div class="nav-grid" id="nav-grid"></div>
    </div>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div class="quiz-header">
                <span id="question-tracker">Question 1 of 100</span>
                <span id="score-tracker">Score: 0</span>
            </div>
            <div class="question-text" id="question-text">Loading question...</div>
            <div class="options-container" id="options-container"></div>
            <button class="action-btn" id="next-btn" onclick="nextQuestion()">Next Question ➔</button>
        </div>

        <div id="results-screen">
            <h1>Quiz Completed!</h1>
            <p id="final-score"></p>
            <button class="restart-btn" onclick="location.reload()">Retake & Reshuffle</button>
        </div>
    </div>

    <script>

            { q: "Which screwdriver features a square shank that permits the use of a wrench to assist in tightening?", opts: ["Heavy-duty screwdriver", "Stubby screwdriver", "Offset screwdriver", "Jeweler's screwdriver"], ans: "Heavy-duty screwdriver" },

            { q: "Which F-shaped, hefty wrench has serrated jaws and is used mainly by plumbers on metal pipes?", opts: ["Pipe wrench", "Basin wrench", "Bionic wrench", "Flare nut wrench"], ans: "Pipe wrench" },

            { q: "Which cold chisel tapers back from the cutting edge to prevent binding and is used to cut keyways in shafts?", opts: ["Crosscut (Cape) chisel", "Round nose chisel", "Diamond point chisel", "Flat chisel"], ans: "Crosscut (Cape) chisel" },
            { q: "Which cold chisel is used to cut oil grooves in bearings or pull a wandering drill bit back to the center?", opts: ["Round nose chisel", "Crosscut chisel", "Diamond point chisel", "Flat chisel"], ans: "Round nose chisel" },
            { q: "Which cold chisel is used for cutting vee-shaped grooves, preparing parts for welding, or squaring corners?", opts: ["Diamond point chisel", "Round nose chisel", "Cape chisel", "Flat chisel"], ans: "Diamond point chisel" },
            { q: "To produce a truer surface than machining, such as fitting brass bearings to shafts, which process/tool is used?", opts: ["Metal scraping", "Filing", "Reaming", "Chipping"], ans: "Metal scraping" },
            { q: "Which type of scraper is very popular because it maintains its cutting edge longer than standard tool steel?", opts: ["Carbide tipped scraper", "Nickel chromium scraper", "High-speed steel scraper", "Diamond scraper"], ans: "Carbide tipped scraper" },
            { q: "Which tap has its first 7 to 10 threads ground flatter to enable easy starting in a hole?", opts: ["Taper tap", "Plug tap", "Bottoming tap", "Die tap"], ans: "Taper tap" },
            { q: "Which tap has 3 to 5 tapered threads and is a good compromise for starting threads and going reasonably deep?", opts: ["Plug tap", "Bottoming tap", "Taper tap", "Starter tap"], ans: "Plug tap" },
            { q: "Which tap has no ground threads at the starting end and is used to cut threads to the very base of a blind hole?", opts: ["Bottoming tap", "Plug tap", "Taper tap", "Die tap"], ans: "Bottoming tap" },
            { q: "When hand tapping a hole, what tool is used to securely hold and rotate the tap?", opts: ["Tap wrench", "Die stock", "Socket wrench", "Slip-joint pliers"], ans: "Tap wrench" },
            { q: "What hand tool is used to cut external threads on a rod or bolt?", opts: ["Threading die", "Taper tap", "Reamer", "Cold chisel"], ans: "Threading die" },
            { q: "The threading die is held in a holder that has a central adjusting screw and two locking screws. What is this holder called?", opts: ["Die stock", "Tap wrench", "Ratchet handle", "Vise grip"], ans: "Die stock" },
            { q: "Which tool is 'wound' into an undersized drilled hole to produce an accurate size and a smooth surface finish?", opts: ["Hand reamer", "Taper tap", "Threading die", "Round file"], ans: "Hand reamer" },
            { q: "Why should you always withdraw a reamer carefully and avoid turning it backwards?", opts: ["To prevent the flutes from becoming blocked with swarf and scratching the finish", "Because it will dull the cutting edge instantly", "It will cause the reamer to snap in half", "It will reverse the threads"], ans: "To prevent the flutes from becoming blocked with swarf and scratching the finish" },
            { q: "According to the Standard Thread Sizes table, what is the Pitch for an M6 metric thread?", opts: ["1.00", "0.80", "1.25", "1.50"], ans: "1.00" },
            { q: "According to the English/Imperial table, how many Threads Per Inch (TPI) does a 1/4 UNC thread have?", opts: ["20", "18", "24", "16"], ans: "20" }
        ];

        let questions = [];
        let currentQuestion = 0;
        let score = 0;
        let userAnswers = [];

        // Fisher-Yates Shuffle
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function initQuiz() {
            let clonedData = JSON.parse(JSON.stringify(rawData));
            questions = shuffle(clonedData);
            
            questions.forEach(q => {
                q.opts = shuffle(q.opts);
            });

            userAnswers = new Array(questions.length).fill(null);
            score = 0;
            
            buildSidebar();
            loadQuestion(0);
        }

        function buildSidebar() {
            const grid = document.getElementById("nav-grid");
            grid.innerHTML = '';
            for (let i = 0; i < questions.length; i++) {
                const btn = document.createElement("button");
                btn.className = "nav-btn";
                btn.innerText = i + 1;
                btn.id = "nav-btn-" + i;
                btn.onclick = () => {
                    loadQuestion(i);
                    toggleSidebar();
                };
                grid.appendChild(btn);
            }
        }

        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("open");
        }

        function loadQuestion(index) {
            currentQuestion = index;
            const q = questions[currentQuestion];
            
            document.getElementById("question-tracker").innerText = `Question ${currentQuestion + 1} of 100`;
            document.getElementById("score-tracker").innerText = `Score: ${score}`;
            document.getElementById("question-text").innerText = q.q;

            const container = document.getElementById("options-container");
            container.innerHTML = '';

            q.opts.forEach((opt) => {
                const btn = document.createElement("button");
                btn.className = "option";
                btn.innerText = opt;
                
                if (userAnswers[currentQuestion] !== null) {
                    btn.disabled = true;
                    if (opt === q.ans) {
                        btn.classList.add("correct");
                    } else if (opt === userAnswers[currentQuestion]) {
                        btn.classList.add("incorrect");
                    }
                } else {
                    btn.onclick = () => selectOption(opt);
                }
                
                container.appendChild(btn);
            });

            const nextBtn = document.getElementById("next-btn");
            if (userAnswers[currentQuestion] !== null) {
                nextBtn.style.display = "block";
                nextBtn.innerText = (currentQuestion === questions.length - 1) ? "Finish Quiz ➔" : "Next Question ➔";
            } else {
                nextBtn.style.display = "none";
            }

            updateSidebarHighlight();
        }

        function selectOption(selectedOpt) {
            const q = questions[currentQuestion];
            userAnswers[currentQuestion] = selectedOpt;

            if (selectedOpt === q.ans) {
                score++;
                document.getElementById(`nav-btn-${currentQuestion}`).classList.add("answered-correct");
            } else {
                document.getElementById(`nav-btn-${currentQuestion}`).classList.add("answered-incorrect");
            }

            loadQuestion(currentQuestion);
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                loadQuestion(currentQuestion + 1);
            } else {
                document.getElementById("quiz-screen").style.display = "none";
                const results = document.getElementById("results-screen");
                results.style.display = "block";
                document.getElementById("final-score").innerText = `You scored ${score} out of 100.`;
            }
        }

        function updateSidebarHighlight() {
            document.querySelectorAll(".nav-btn").forEach((btn, idx) => {
                btn.classList.remove("active");
                if (idx === currentQuestion) {
                    btn.classList.add("active");
                }
            });
        }

        window.onload = initQuiz;

    </script>
