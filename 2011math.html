            cursor: pointer;
            color: var(--text-color);

            color: var(--accent-color);

            font-size: 1.3rem;
            color: var(--nav-bg);
            font-weight: 700;

            background-color: var(--nav-bg);
            color: white;
            display: flex;
            flex-direction: column;

            position: fixed;
            height: calc(100% - 60px);
            top: 60px;
            z-index: 99;
            transform: translateX(-100%);

            font-size: 1.1rem;
            font-weight: bold;
            background-color: #1e272e;
            text-align: center;
            border-bottom: 1px solid #57606f;
        }

        .nav-grid {
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            overflow-y: auto;
            flex: 1;
        }

        .nav-item {
            background-color: #57606f;
            color: white;
            border: none;
            padding: 10px 0;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.2s;

            background-color: #747d8c;

            background-color: #2ed573;
            color: #2f3542;

            padding: 40px 20px;
            display: flex;
            justify-content: center;
            overflow-y: auto;

            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);

            color: #747d8c;
            margin-bottom: 20px;
            border-bottom: 2px solid #f1f2f6;
            padding-bottom: 10px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            text-transform: uppercase;

        .question-text {
            font-size: 1.25rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #2f3542;

            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;

            border: 2px solid #ced6e0;
            padding: 16px 20px;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
            color: #2f3542;

            background-color: #e8f8f5;

            font-weight: bold;
        }

            background-color: #ffefea;
            border-color: var(--wrong-color);
            color: #c0392b;
            font-weight: bold;
        }

        .option-letter {
            font-weight: bold;
            margin-right: 15px;
            color: var(--accent-color);

            border-radius: 0 6px 6px 0;

            color: var(--accent-color);
            display: block;
            margin-bottom: 12px;
            font-size: 1.2rem;
            border-bottom: 1px dashed #a4b0be;

            text-transform: uppercase;

        .controls {
            display: flex;
            justify-content: space-between;
            border-top: 2px solid #f1f2f6;
            padding-top: 20px;
        }

        .control-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;

            text-transform: uppercase;

            background-color: var(--hover-color);
        }

            background-color: #ced6e0;
            color: #747d8c;

            top: 0; left: 0; width: 100%; height: 100%;

            display: none;
        }

            color: #ff4757;

        }

    <script>
        // Custom Math/Engineering Solutions mapped to question numbers
        const solutionMap = {
            1: { ans: "B", sol: "Standard acceleration due to gravity in English units is $32.2 \\text{ ft/s}^2$." },
            2: { ans: "A", sol: "Let $M$ = Mother's age, $D$ = Daughter's age. Eq 1: $2M = 6D + 8 \\rightarrow M = 3D + 4$. Eq 2: $(M-10) + (D-10) = 44 \\rightarrow M + D = 64$. Substitute M: $(3D + 4) + D = 64 \\rightarrow 4D = 60 \\rightarrow D = 15$." },
            3: { ans: "A", sol: "Compound Interest: $F = P(1 + i/m)^{mt} = 2000(1 + 0.11/4)^{4 \\times 5} = 2000(1.0275)^{20} \\approx 3440.85$. Closest option is P3,440.00." },
            4: { ans: "C", sol: "Discount = $2000 - 1950 = 50$. Rate of discount $d = \\frac{\\text{Discount}}{\\text{Principal}} = \\frac{50}{2000} = 0.025$ or $2.5\\%$." },
            5: { ans: "A", sol: "For the infinite power tower $x^{x^{\\dots}} = 10$, we set $x^{10} = 10 \\rightarrow x = 10^{1/10} \\approx 1.258925$." },
            6: { ans: "A", sol: "Resultant $R = F_1 + F_2 + F_3 = (4+9+5)i + (7+2-3)j + (6+11-8)k = 18i + 6j + 9k$. Magnitude $|R| = \\sqrt{18^2 + 6^2 + 9^2} = \\sqrt{324 + 36 + 81} = \\sqrt{441} = 21$." },
            7: { ans: "D", sol: "Complete the square: $(x^2 - 6x + 9) + (y^2 + 4y + 4) = 12 + 9 + 4 \\rightarrow (x-3)^2 + (y+2)^2 = 25$. Radius $r = \\sqrt{25} = 5$. Diameter $d = 2r = 10$." },
            8: { ans: "B", sol: "Absolute value of complex number $a + bi = \\sqrt{a^2 + b^2} = \\sqrt{3^2 + 4^2} = \\sqrt{9 + 16} = 5$." },
            9: { ans: "B", sol: "Free fall distance: $h = \\frac{1}{2}gt^2 \\rightarrow 60 = \\frac{1}{2}(9.81)t^2 \\rightarrow t^2 = 12.23 \\rightarrow t \\approx 3.5$ seconds." },
            10: { ans: "A", sol: "Using clock kinematics between 3 and 4. The relative positions of the hands are calculated resulting in 3:06.36." },
            50: { ans: "A", sol: "Specific volume $v = 1/\\gamma$. Given $\\gamma = 58.5 \\text{ lbf/ft}^3$. First convert to metric: $58.5 \\text{ lbf/ft}^3 = 0.936 \\text{ g/cm}^3$. $v = 1/0.936 = 1.0675 \\text{ cm}^3\\text{/g}$." },
            51: { ans: "B", sol: "Compound Interest: $P(1+i)^n = F$. The effective rate mathematically corresponds to standard periodic interest compounding evaluated roughly at 4.06% based on problem figures." },
            53: { ans: "D", sol: "Initial state: ladder $L_1 = 5$, base $x = 3$. Height $y_1 = \\sqrt{5^2 - 3^2} = 4$m. New state: base $x=3$ stays same, height $y_2 = 4 + 1 = 5$m. New ladder $L_2 = \\sqrt{3^2 + 5^2} = \\sqrt{34} = 5.83095$m. Extension = $5.83095 - 5 = 0.83095$m." },
            54: { ans: "A", sol: "Interior angle of regular polygon $= \\frac{180(n-2)}{n}$. For pentagon $n=5$, angle $= \\frac{180(3)}{5} = 108^\\circ$." },
            55: { ans: "D", sol: "Present Worth of Annuity: $P_a = A\\left[\\frac{1 - (1+i)^{-n}}{i}\\right]$. $i = 0.12/12 = 0.01$. $n = 5 \\times 12 = 60$. $P_a = 5000[1 - (1.01)^{-60}] / 0.01 = 5000(44.955) = 224,775.19$. Total Cash Price = Downpayment + $P_a = 30000 + 224775.19 = 254,775.19$." },
            56: { ans: "B", sol: "Sinking Fund: $A = F \\left[\\frac{i}{(1+i)^n - 1}\\right]$. $F = 25000$, $i = 0.12/4 = 0.03$, $n = 8 \\times 4 = 32$. $A = 25000[0.03 / ((1.03)^{32} - 1)] = 25000[0.03 / 1.575] = 476.17$." },
            73: { ans: "D", sol: "Equivalent rates: $(1 + r_s/2)^2 = (1 + r_q/4)^4$. $(1 + 0.14/2)^2 = (1 + r_q/4)^4 \\rightarrow 1.07^2 = (1 + r_q/4)^4 \\rightarrow 1.1449 = (1 + r_q/4)^4 \\rightarrow 1 + r_q/4 = 1.0344 \\rightarrow r_q = 0.1376$ or $13.76\\%$." },
            78: { ans: "C", sol: "Let angles be $A, B, C$. Eq1: $A+B = C$. Eq2: $A-B = (2/3)C$. Since $A+B+C=180$, and $A+B=C$, then $C+C=180 \\rightarrow 2C=180 \\rightarrow C=90^\\circ$." },
            81: { ans: "A", sol: "Prime numbers between 1 and 15: 2, 3, 5, 7, 11, 13. Sum = $2+3+5+7+11+13 = 41$." },
            85: { ans: "A", sol: "$i^{1997} + i^{1999}$. Divide exponent by 4 to find remainder. $1997/4 = 499$ rem 1, so $i^{1997} = i^1 = i$. $1999/4 = 499$ rem 3, so $i^{1999} = i^3 = -i$. Sum $= i + (-i) = 0$." }
        };

        const rawTextData = document.getElementById('raw-data').textContent || "";
        const blocks = rawTextData.split(/(?:^|\n|\r\n)(?=\s*\d+\.\s)/).map(b => b.trim()).filter(b => b.length > 0);
        const quizData = [];

        // Parser
        blocks.forEach((block, index) => {
            const qMatch = block.match(/^(\d+)\.\s([\s\S]*?)(?=(?:a|A|\.a)\.?\s|\n(?:a|A)\.)/);
            if (!qMatch) return;
            
            const num = qMatch[1];
            const qText = qMatch[2].trim();
            const optionsStr = block.substring(qMatch[0].length);
            const optParts = optionsStr.split(/(?:^|\n)([a-d]|[A-D])\)?\s|\.\s/).filter(Boolean);
            
            const options = [];
            let ansIdx = 0;
            
            for (let i = 0; i < optParts.length; i += 2) {
                let letter = optParts[i];
                if (letter && letter.length === 1) { // A, B, C, D, a, b, c, d
                    let text = (optParts[i+1] || "").trim();
                    if (text.includes('*')) {
                        ansIdx = options.length;
                        text = text.replace(/\*/g, '').trim();
                    }
                    options.push({ letter: letter.toUpperCase(), text: text });
                }
            }

            const mapData = solutionMap[num] || { sol: "Theoretical concept derived from general engineering, economics, or mathematics principles." };
            
            quizData.push({
                num, q: qText, options, ansIdx, solText: mapData.sol, userAnswered: false
            });
        });

        let currentIndex = 0;

        function initApp() {
            if (quizData.length === 0) {
                document.getElementById('qHeader').innerHTML = "<span class='error-message'>Parse Error</span>";
                document.getElementById('qText').innerHTML = "Could not parse questions. Check raw text format.";
                return;
            }
            document.getElementById('controls').style.display = "flex";
            buildNav();
            loadQuestion(currentIndex);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function buildNav() {
            const grid = document.getElementById('navGrid');
            grid.innerHTML = '';
            quizData.forEach((q, idx) => {
                const btn = document.createElement('button');
                btn.className = 'nav-item';
                btn.id = `nav-btn-${idx}`;
                btn.innerText = q.num;
                btn.onclick = () => { loadQuestion(idx); toggleSidebar(); };
                grid.appendChild(btn);
            });
        }

        function updateNavStyles() {
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`nav-btn-${currentIndex}`).classList.add('active');
            quizData.forEach((q, idx) => {
                const btn = document.getElementById(`nav-btn-${idx}`);
                if (q.userAnswered) btn.classList.add('completed');
            });
        }

        function loadQuestion(index) {
            currentIndex = index;
            const q = quizData[currentIndex];
            
            document.getElementById('qHeader').innerText = `Question ${q.num} of ${quizData.length}[cite: 12]`;
            document.getElementById('qText').innerHTML = q.q;
            
            const optionsGrid = document.getElementById('optionsGrid');
            optionsGrid.innerHTML = '';
            
            const solContainer = document.getElementById('solutionContainer');
            solContainer.style.display = 'none';

            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="option-letter">${opt.letter}.</span> ${opt.text}`;
                
                if (q.userAnswered) {
                    btn.disabled = true;
                    if (i === q.ansIdx) btn.classList.add('correct');
                    else if (i === q.userSelectedIdx) btn.classList.add('wrong');
                } else {
                    btn.onclick = () => selectAnswer(i, btn);
                }
                optionsGrid.appendChild(btn);
            });

            if (q.userAnswered) showSolution(q);

            document.getElementById('prevBtn').disabled = (currentIndex === 0);
            document.getElementById('nextBtn').disabled = (currentIndex === quizData.length - 1);
            
            updateNavStyles();

            if (window.MathJax) {
                MathJax.typesetPromise([document.getElementById('quizCard')]);
            }
        }

        function selectAnswer(selectedIndex, selectedBtn) {
            const q = quizData[currentIndex];
            q.userAnswered = true;
            q.userSelectedIdx = selectedIndex;

            const buttons = document.getElementById('optionsGrid').children;
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].disabled = true;
                if (i === q.ansIdx) buttons[i].classList.add('correct');
            }

            if (selectedIndex !== q.ansIdx) selectedBtn.classList.add('wrong');

            showSolution(q);
            updateNavStyles();
        }

        function showSolution(q) {
            const solContainer = document.getElementById('solutionContainer');
            document.getElementById('solutionText').innerText = q.solText;
            solContainer.style.display = 'block';

            if (window.MathJax) {
                MathJax.typesetPromise([solContainer]);
            }
        }

        function nextQuestion() {
            if (currentIndex < quizData.length - 1) loadQuestion(currentIndex + 1);
        }

        function prevQuestion() {
            if (currentIndex > 0) loadQuestion(currentIndex - 1);
        }

        window.onload = initApp;
    </script>
