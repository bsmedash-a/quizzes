<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASH A Review Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-light: #ffffff;
            --text-muted: #e0e0e0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1a2a6c, #11998e);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            color: var(--text-light); min-height: 100vh; padding: 2rem; overflow-x: hidden; display: flex; flex-direction: column;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .shape { position: absolute; filter: blur(60px); z-index: -1; opacity: 0.5; border-radius: 50%; animation: float 10s infinite ease-in-out; }
        .shape1 { top: 10%; left: 10%; width: 300px; height: 300px; background: #00d2ff; }
        .shape2 { bottom: 10%; right: 10%; width: 400px; height: 400px; background: #3a7bd5; animation-delay: -5s; }
        .shape3 { top: 50%; left: 50%; width: 250px; height: 250px; background: #8e2de2; animation-delay: -2s; }
        @keyframes float { 0% { transform: translateY(0px) scale(1); } 50% { transform: translateY(-30px) scale(1.1); } 100% { transform: translateY(0px) scale(1); } }

        header { text-align: center; margin-bottom: 2rem; position: relative; z-index: 1; }
        h1 { font-size: 3rem; font-weight: 700; margin-bottom: 0.5rem; background: -webkit-linear-gradient(45deg, #00d2ff, #ffffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.subtitle { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 2rem; }

        .main-menu { display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; margin-top: 2rem; width: 100%; max-width: 1200px; margin: 0 auto; z-index: 1; position: relative; }
        
        /* Menu Links */
        .menu-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 3rem 2rem; width: 350px; text-align: center; backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); text-decoration: none; color: white;
            transition: transform 0.3s, box-shadow 0.3s; display: block;
        }
        .menu-card:hover { transform: translateY(-10px); box-shadow: 0 15px 40px rgba(0, 210, 255, 0.3); border-color: rgba(255,255,255,0.4); }
        .menu-card .icon { font-size: 4rem; margin-bottom: 1rem; }
        .menu-card h2 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        
        @media (max-width: 768px) { h1 { font-size: 2.2rem; } .menu-card { width: 100%; } }
    </style>
</head>
<body>
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>
    <div class="shape shape3"></div>

    <header>
        <h1>DASH A Reviewer Hub</h1>
        <p class="subtitle">Comprehensive study materials and interactive quizzes especially made for dash a folks</p>
    </header>

    <div class="main-menu">
        <a href="notes.html" class="menu-card">
            <div class="icon">📓</div>
            <h2>Notes</h2>
            <p>Study guides, formulas, and lecture summaries.</p>
        </a>
        
        <a href="quizzes.html" class="menu-card">
            <div class="icon">📝</div>
            <h2>Sample Quizzes</h2>
            <p>For looksfamming</p>
        </a>

        <a href="boards.html" class="menu-card">
            <div class="icon">🎓</div>
            <h2>Past Board Exams</h2>
            <p>Review and practice with previous board examination questions.</p>
        </a>
    </div>
</body>
</html>
