        const answers = [
            "c", "d", "c", "d", "a", "a", "c", "b", "a", "c", 
            "b", "a", "d", "a", "a", "b", "a", "a", "c", "b", 
            "b", "a", "c", "d", "b", "a", "a", "d", "c", "d", 
            "b", "b", "a", "b", "a", "b", "a", "b", "a", "a", 
            "c", "b", "a", "a", "d", "d", "b", "d", "a", "a", 
            "d", "c", "c", "c", "b", "b", "a", "a", "b", "a", 
            "b", "b", "b", "c", "a", "c", "c", "c", "c", "d", 
            "b", "d", "b", "d", "a", "b", "a", "b", "c", "d", 
            "b", "a", "b", "d", "a", "a", "a", "a", "d", "a", 
            "d", "d", "a", "c", "c", "a", "c", "a", "c", "c"
        ];

        const rawTextData = document.getElementById('raw-data').textContent || "";
        const blocks = rawTextData.split(/(?:^|\n|\r\n)(?=\d+\.\s)/).map(b => b.trim()).filter(b => b.length > 0);
        
        const quizData = [];
        let totalScore = 0;

        blocks.forEach((block) => {
            const optStartMatch = block.match(/\n\s*[A-Da-d][\.\)]\s/);
            if (!optStartMatch) return; 
            
            const optIndex = optStartMatch.index;
            let questionPart = block.substring(0, optIndex).trim();
            const optionsStr = block.substring(optIndex).trim();
            
            const numMatch = questionPart.match(/^(\d+)\.\s+/);
            if (!numMatch) return;
            
            const qText = questionPart.substring(numMatch[0].length).trim();
            
            const optRegex = /(?:^|\n)\s*([A-Da-d])[\.\)]\s/g;
            let match;
            let indices = [];
            while ((match = optRegex.exec(optionsStr)) !== null) {
                indices.push({ letter: match[1].toLowerCase(), index: match.index, matchLength: match[0].length });
            }

            const options = [];
            
            // Assign the correct answer sequentially from the pre-mapped array
            const expectedAnsLetter = answers[quizData.length] || "a";
            let ansIdx = 0;

            for (let i = 0; i < indices.length; i++) {
                let start = indices[i].index + indices[i].matchLength;
                let end = (i + 1 < indices.length) ? indices[i+1].index : optionsStr.length;
                let text = optionsStr.substring(start, end).trim();
                
                if (indices[i].letter === expectedAnsLetter) {
                    ansIdx = i;
                }
                options.push({ letter: indices[i].letter.toUpperCase(), text: text });
            }
            
            if (options.length > 0) {
                quizData.push({
                    num: quizData.length + 1, // Fix visual numbering 1 to 100 perfectly
                    q: qText, 
                    options: options, 
                    ansIdx: ansIdx, 
                    userAnswered: false,
                    isCorrect: false
                });
            }
        });

        let currentIndex = 0;

        function initApp() {
            if (quizData.length === 0) {
                document.getElementById('qHeader').innerHTML = "<span class='error-message'>Parse Error</span>";
                document.getElementById('qText').innerHTML = "Could not parse questions. Check raw text format.";
                return;
            }
            document.getElementById('controls').style.display = "flex";
            buildNav();
            loadQuestion(currentIndex);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function buildNav() {
            const grid = document.getElementById('navGrid');
            grid.innerHTML = '';
            quizData.forEach((q, idx) => {
                const btn = document.createElement('button');
                btn.className = 'nav-item';
                btn.id = `nav-btn-${idx}`;
                btn.innerText = q.num; 
                btn.onclick = () => { loadQuestion(idx); toggleSidebar(); };
                grid.appendChild(btn);
            });
        }

        function updateNavStyles() {
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`nav-btn-${currentIndex}`).classList.add('active');
            
            quizData.forEach((q, idx) => {
                const btn = document.getElementById(`nav-btn-${idx}`);
                if (q.userAnswered) btn.classList.add('completed');
            });
        }

        function updateScore() {
            document.getElementById('scoreTracker').innerText = `Score: ${totalScore} / ${quizData.length}`;
        }

        function loadQuestion(index) {
            currentIndex = index;
            const q = quizData[currentIndex];
            
            document.getElementById('qHeader').innerHTML = `Problem ${q.num} of ${quizData.length}`;
            document.getElementById('qText').innerHTML = q.q;
            
            const optionsGrid = document.getElementById('optionsGrid');
            optionsGrid.innerHTML = '';
            
            const feedbackMsg = document.getElementById('feedbackMessage');
            feedbackMsg.style.display = 'none';

            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="option-letter">${opt.letter}.</span> ${opt.text}`;
                
                if (q.userAnswered) {
                    btn.disabled = true;
                    if (i === q.ansIdx) {
                        btn.classList.add('correct');
                    } else if (i === q.userSelectedIdx) {
                        btn.classList.add('wrong');
                    }
                } else {
                    btn.onclick = () => selectAnswer(i, btn);
                }
                optionsGrid.appendChild(btn);
            });

            if (q.userAnswered) {
                showFeedback(q.isCorrect, q);
            }

            document.getElementById('prevBtn').disabled = (currentIndex === 0);
            document.getElementById('nextBtn').disabled = (currentIndex === quizData.length - 1);
            
            updateNavStyles();
            updateScore();

            if (window.MathJax) {
                MathJax.typesetPromise([document.getElementById('quizCard')]);
            }
        }

        function selectAnswer(selectedIndex, selectedBtn) {
            const q = quizData[currentIndex];
            q.userAnswered = true;
            q.userSelectedIdx = selectedIndex;
            q.isCorrect = (selectedIndex === q.ansIdx);

            if (q.isCorrect) totalScore++;

            const buttons = document.getElementById('optionsGrid').children;
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].disabled = true;
                if (i === q.ansIdx) buttons[i].classList.add('correct');
            }

            if (!q.isCorrect) selectedBtn.classList.add('wrong');

            showFeedback(q.isCorrect, q);
            updateNavStyles();
            updateScore();
        }

        function showFeedback(isCorrect, q) {
            const feedbackMsg = document.getElementById('feedbackMessage');
            feedbackMsg.className = 'feedback-message ' + (isCorrect ? 'success' : 'error');
            
            const correctOpt = q.options[q.ansIdx];
            
            if (isCorrect) {
                feedbackMsg.innerHTML = "Correct! The answer is <br><br><strong>" + correctOpt.letter + ". " + correctOpt.text + "</strong>";
            } else {
                feedbackMsg.innerHTML = "Incorrect! The correct answer is <br><br><strong>" + correctOpt.letter + ". " + correctOpt.text + "</strong>";
            }
            feedbackMsg.style.display = "block";
            
            if (window.MathJax) {
                MathJax.typesetPromise([feedbackMsg]);
            }
        }

        function nextQuestion() {
            if (currentIndex < quizData.length - 1) loadQuestion(currentIndex + 1);
        }

        function prevQuestion() {
            if (currentIndex > 0) loadQuestion(currentIndex - 1);
        }

        window.onload = initApp;
    </script>
</body>
</html>
