<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mechanical Engineering Quiz | NEXUS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #1a3c54;
            --gradient-light: #228b9c;
            --gradient-dark: #12283e;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-light: #ffffff;
            --text-cyan: #38bdf8;
            --btn-blue: #1da1f2;
            --btn-blue-hover: #1a8cd8;
            --correct-bg: rgba(16, 185, 129, 0.15);
            --correct-border: #10b981;
            --wrong-bg: rgba(239, 68, 68, 0.15);
            --wrong-border: #ef4444;
            --nav-bg: rgba(18, 40, 62, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: radial-gradient(circle at 10% 40%, var(--gradient-light), var(--gradient-dark) 80%);
            background-attachment: fixed;
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- HAMBURGER & TOP NAV --- */
        .top-nav {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: flex-start;
            position: relative;
            z-index: 100;
        }

        .hamburger {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-light);
            font-size: 1.8rem;
            cursor: pointer;
            width: 50px;
            height: 50px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }

        .hamburger:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* --- SIDE NAVIGATION (QUESTION GRID) --- */
        .side-nav {
            position: fixed;
            top: 0;
            left: -350px; /* Hidden by default */
            width: 320px;
            height: 100vh;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 80px 20px 20px 20px;
            transition: 0.4s ease-in-out;
            z-index: 99;
            overflow-y: auto;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        .side-nav.active {
            left: 0;
        }

        .nav-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            text-align: center;
            color: var(--text-cyan);
            font-weight: 600;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: var(--text-light);
            padding: 10px 0;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-btn.active-q {
            border: 2px solid var(--text-cyan);
            background: rgba(56, 189, 248, 0.2);
        }

        .nav-btn.correct-nav {
            background: var(--correct-border);
            color: #fff;
            border: none;
        }

        .nav-btn.wrong-nav {
            background: var(--wrong-border);
            color: #fff;
            border: none;
        }

        /* --- QUIZ CONTAINER (GLASSMORPHISM) --- */
        .quiz-container {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            width: 90%;
            max-width: 800px;
            margin: 0 auto 40px auto;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 10;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .question-number {
            color: var(--text-light);
            font-weight: 500;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .score-tracker {
            color: var(--text-cyan);
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
            width: 100%;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-light);
            padding: 18px 25px;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 400;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.12);
        }

        .option-btn.correct {
            background: var(--correct-bg);
            border: 1px solid var(--correct-border);
        }

        .option-btn.wrong {
            background: var(--wrong-bg);
            border: 1px solid var(--wrong-border);
        }

        .option-btn:disabled {
            cursor: default;
        }

        /* --- NEXT BUTTON --- */
        .next-btn {
            background-color: var(--btn-blue);
            color: #fff;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            display: none; 
            transition: 0.3s;
            text-transform: uppercase;
        }

        .next-btn:hover {
            background-color: var(--btn-blue-hover);
            box-shadow: 0 4px 15px rgba(29, 161, 242, 0.4);
        }

        /* --- RESULTS SCREEN --- */
        .results-container {
            display: none;
            text-align: center;
        }

        .results-container h2 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: var(--text-cyan);
        }

        .results-container p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        
        /* Mobile adjustments */
        @media (max-width: 600px) {
            .quiz-container { padding: 25px; }
            .question-text { font-size: 1.1rem; }
            .option-btn { padding: 15px; font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <!-- TOP NAVIGATION -->
    <div class="top-nav">
        <button class="hamburger" onclick="toggleNav()">☰</button>
    </div>

    <!-- SIDE NAVIGATION (QUESTION GRID) -->
    <div class="side-nav" id="sideNav">
        <div class="nav-title">Question Navigator</div>
        <div class="grid-container" id="navGrid">
            <!-- Buttons dynamically generated -->
        </div>
    </div>

    <!-- QUIZ INTERFACE -->
    <div class="quiz-container" id="quizBox">
        <div class="quiz-header">
            <span class="question-number" id="questionCounter">Q 1 / 100</span>
            <span class="score-tracker">Score: <span id="scoreDisplay">0</span></span>
        </div>
        
        <div class="divider"></div>

        <h2 class="question-text" id="questionText">Loading question...</h2>
        
        <div class="options-grid" id="optionsGrid"></div>

        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">NEXT QUESTION ➔</button>
    </div>

    <!-- RESULTS SCREEN -->
    <div class="quiz-container results-container" id="resultsBox">
        <h2>Quiz Completed!</h2>
        <p>You scored <strong id="finalScore">0</strong> out of 100.</p>
        <button class="next-btn" style="display: block; margin-top: 20px;" onclick="location.reload()">RETAKE QUIZ</button>
    </div>

    <!-- SCRIPT -->

            document.getElementById('sideNav').classList.toggle('active');
        }

            const sideNav = document.getElementById('sideNav');
            const hamburger = document.querySelector('.hamburger');

                sideNav.classList.remove('active');

        // System State Variables
        let activeQuiz = [];
        let userState = []; 
        let currentQuestionIndex = 0;
        let score = 0;
        const letterPrefixes = ['A. ', 'B. ', 'C. ', 'D. '];

        // --- DOUBLE RANDOMIZER (Fisher-Yates Shuffle) ---
        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

        function initQuiz() {
            // 1. Clone and shuffle the 100 questions
            let tempQuiz = JSON.parse(JSON.stringify(rawQuizData));
            tempQuiz = shuffleArray(tempQuiz);

            // 2. Shuffle the options inside EACH question
            activeQuiz = tempQuiz.map(qObj => {
                // Attach original index to keep track of the correct answer
                let optionsWithMeta = qObj.opts.map((opt, i) => ({ text: opt, isCorrect: i === qObj.a }));
                optionsWithMeta = shuffleArray(optionsWithMeta);

                return {
                    q: qObj.q,
                    opts: optionsWithMeta.map(o => o.text),
                    a: optionsWithMeta.findIndex(o => o.isCorrect) // New correct index
                };
            });

            // Initialize tracking state
            userState = new Array(activeQuiz.length).fill(null);
            
            buildNavigationGrid();
            loadQuestion();
        }

        // --- NAVIGATION GRID BUILDER ---
        function buildNavigationGrid() {
            const grid = document.getElementById('navGrid');
            grid.innerHTML = '';
            for (let i = 0; i < activeQuiz.length; i++) {
                const btn = document.createElement('button');
                btn.innerText = i + 1;
                btn.classList.add('nav-btn');
                btn.id = `nav-btn-${i}`;
                btn.onclick = () => jumpToQuestion(i);
                grid.appendChild(btn);
            }
        }

        function updateNavGridStyle() {
            for (let i = 0; i < activeQuiz.length; i++) {
                const btn = document.getElementById(`nav-btn-${i}`);
                // Clear active outline
                btn.classList.remove('active-q');
                if (i === currentQuestionIndex) {
                    btn.classList.add('active-q');
                }
                
                // Color code if answered
                if (userState[i] !== null) {
                    if (userState[i].isCorrect) {
                        btn.classList.add('correct-nav');
                    } else {
                        btn.classList.add('wrong-nav');
                    }
                }
            }
        }

        function jumpToQuestion(index) {
            currentQuestionIndex = index;
            document.getElementById('sideNav').classList.remove('active');
            loadQuestion();
        }

        // --- LOAD QUESTION UI ---
        function loadQuestion() {
            updateNavGridStyle();
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('optionsGrid').innerHTML = '';
            
            const currentData = activeQuiz[currentQuestionIndex];
            document.getElementById('questionCounter').innerText = `Q ${currentQuestionIndex + 1} / ${activeQuiz.length}`;
            document.getElementById('questionText').innerText = `${currentQuestionIndex + 1}. ${currentData.q}`;

            const isAnswered = userState[currentQuestionIndex] !== null;

            // Generate Options
            currentData.opts.forEach((optionText, index) => {
                const button = document.createElement('button');
                // Apply A, B, C, D formatting
                button.innerText = letterPrefixes[index] + optionText;
                button.classList.add('option-btn');

                if (isAnswered) {
                    button.disabled = true;
                    // Re-apply correct/wrong styles if already answered
                    if (index === currentData.a) {
                        button.classList.add('correct');
                    } else if (index === userState[currentQuestionIndex].selectedIndex) {
                        button.classList.add('wrong');
                    }
                } else {
                    button.onclick = () => selectAnswer(index, button);
                }

                document.getElementById('optionsGrid').appendChild(button);
            });

            // If already answered, show next button
            if (isAnswered) {
                document.getElementById('nextBtn').style.display = 'block';
            }
        }

        // --- ANSWER LOGIC ---
        function selectAnswer(selectedIndex, selectedButton) {
            const currentData = activeQuiz[currentQuestionIndex];
            const allButtons = document.getElementById('optionsGrid').children;
            const isCorrect = selectedIndex === currentData.a;

            // Save state
            userState[currentQuestionIndex] = {
                selectedIndex: selectedIndex,
                isCorrect: isCorrect
            };

            // Update Score
            if (isCorrect) {
                score++;
                document.getElementById('scoreDisplay').innerText = score;
            }

            // Lock and format buttons
            for (let i = 0; i < allButtons.length; i++) {
                allButtons[i].disabled = true;
                if (i === currentData.a) {
                    allButtons[i].classList.add('correct');
                }
            }

            if (!isCorrect) {
                selectedButton.classList.add('wrong');
            }

            // Update Side Nav color instantly
            updateNavGridStyle();

            document.getElementById('nextBtn').style.display = 'block';
        }

        function nextQuestion() {
            if (currentQuestionIndex < activeQuiz.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                // Check if all questions are answered
                const unansweredCount = userState.filter(s => s === null).length;
                if (unansweredCount > 0) {
                    alert(`You still have ${unansweredCount} unanswered questions! Open the side menu to find them (the grey boxes).`);
                    document.getElementById('sideNav').classList.add('active');
                } else {
                    showResults();
                }
            }
        }

        function showResults() {
            document.getElementById('quizBox').style.display = 'none';
            document.getElementById('resultsBox').style.display = 'block';
            document.getElementById('finalScore').innerText = score;
        }

        // Start Quiz on Load
        initQuiz();
    </script>
