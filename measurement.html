<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Measurement Tools Mastery Quiz</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #27ae60;
            --accent-hover: #219a52;
            --correct: #2980b9;
            --incorrect: #e74c3c;
            --text-main: #333;
            --text-light: #fff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Hamburger Menu Button */
        #hamburger-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: var(--primary);
            border: none;
            border-radius: 6px;
            padding: 12px;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            transition: 0.3s;
        }

        #hamburger-btn:hover {
            background-color: var(--accent);
        }

        #hamburger-btn div {
            width: 24px;
            height: 3px;
            background-color: var(--text-light);
            border-radius: 2px;
        }

        /* Sidebar Navigation */
        #sidebar {
            position: fixed;
            top: 0;
            left: -350px;
            width: 320px;
            height: 100vh;
            background-color: var(--primary);
            color: var(--text-light);
            transition: left 0.3s ease-in-out;
            z-index: 999;
            box-shadow: 2px 0 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        #sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 30px 20px 20px 20px;
            text-align: center;
            background-color: var(--secondary);
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 2px solid var(--accent);
            margin-top: 50px;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .nav-btn {
            background-color: var(--secondary);
            color: var(--text-light);
            border: 1px solid #4a6278;
            border-radius: 4px;
            padding: 10px 0;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-btn:hover { background-color: var(--accent); border-color: var(--accent); }
        .nav-btn.answered-correct { background-color: var(--correct); border-color: var(--correct); }
        .nav-btn.answered-incorrect { background-color: var(--incorrect); border-color: var(--incorrect); }
        .nav-btn.active { box-shadow: 0 0 0 3px #f1c40f; transform: scale(1.1); z-index: 2; }

        /* Main Quiz Container */
        .quiz-container {
            background-color: #fff;
            width: 92%;
            max-width: 800px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 40px;
            margin: 40px 0;
            position: relative;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
            font-size: 1.1rem;
            font-weight: bold;
            color: #7f8c8d;
        }

        .question-text {
            font-size: 1.25rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: var(--primary);
            font-weight: 600;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background-color: #f8f9fa;
            border: 2px solid #dcdde1;
            border-radius: 8px;
            padding: 16px 20px;
            font-size: 1.05rem;
            color: var(--text-main);
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }

        .option:hover:not(:disabled) {
            background-color: #e2e8f0;
            border-color: #b2bec3;
        }

        .option:disabled {
            cursor: not-allowed;
            opacity: 0.95;
        }

        .option.correct {
            background-color: var(--correct) !important;
            border-color: #219a52 !important;
            color: var(--text-light) !important;
        }

        .option.incorrect {
            background-color: var(--incorrect) !important;
            border-color: #a93226 !important;
            color: var(--text-light) !important;
        }

        .action-btn {
            background-color: var(--accent);
            color: var(--text-light);
            border: none;
            border-radius: 8px;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            width: 100%;
            transition: 0.2s;
            display: none;
        }

        .action-btn:hover { background-color: var(--accent-hover); }

        #results-screen {
            display: none;
            text-align: center;
        }

        #results-screen h1 { font-size: 2.8rem; color: var(--primary); margin-bottom: 15px; }
        #results-screen p { font-size: 1.3rem; color: #7f8c8d; margin-bottom: 30px; }
        
        .restart-btn {
            background-color: var(--correct);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .restart-btn:hover { background-color: #219a52; }

    </style>
</head>
<body>

    <button id="hamburger-btn" onclick="toggleSidebar()">
        <div></div>

    </button>

    <div id="sidebar">
        <div class="sidebar-header">Question Navigator</div>

        </div>
    </div>

            { q: "In the 0.4-7mm Metric Screw Pitch Gauge set, what is the largest pitch it can measure?", opts: ["7 mm", "6 mm", "0.4 mm", "21 mm"], ans: "7 mm" },
            { q: "In the 4-42 TPI Unified Screw Pitch Gauge set, what is the smallest thread pitch (highest TPI) it can measure?", opts: ["42 TPI", "4 TPI", "30 TPI", "60 TPI"], ans: "42 TPI" },
            { q: "On a micrometer, the friction thimble serves the exact same purpose as the:", opts: ["Ratchet stop", "Spindle lock", "Anvil", "Sleeve"], ans: "Ratchet stop" },
            { q: "To lock a micrometer measurement in place before removing it from the workpiece, you use the:", opts: ["Spindle lock", "Ratchet stop", "Thimble", "Frame"], ans: "Spindle lock" },
            { q: "The part of the vernier caliper that extends from the back and measures the depth of blind holes is called the:", opts: ["Depth probe/blade", "Fixed jaw", "Movable jaw", "Anvil"], ans: "Depth probe/blade" },
            { q: "Which tool is best for locating the exact center of a round steel shaft?", opts: ["Hermaphrodite caliper", "Inside caliper", "Snap gage", "Feeler gage"], ans: "Hermaphrodite caliper" },
            { q: "The fractional inch system relies on divisions of halves, quarters, eighths, etc., meaning it is based on:", opts: ["The binary system (base 2)", "The decimal system (base 10)", "The metric system (base 10)", "The hex system (base 16)"], ans: "The binary system (base 2)" },
            { q: "A micrometer calibrated in ten-thousandths of an inch (0.0001\") features an additional scale on the sleeve called a:", opts: ["Vernier scale", "Main scale", "Thimble scale", "Metric scale"], ans: "Vernier scale" },
            { q: "A part measured with a Go/No-Go gage is rejected if:", opts: ["The 'No-Go' gage fits the part", "The 'Go' gage fits the part", "The gage is made of hardened steel", "The part has a radius"], ans: "The 'No-Go' gage fits the part" },
            { q: "When using a radius gage, a perfect match means:", opts: ["No light is visible between the gage and the workpiece profile", "The gage slides freely with a large gap", "The gage bends to fit the part", "The gage removes material from the part"], ans: "No light is visible between the gage and the workpiece profile" },
            { q: "Why are measuring surfaces on micrometers and vernier calipers often tipped with carbide?", opts: ["To increase wear resistance and maintain accuracy", "To make the tool lighter", "To reduce the cost of the tool", "To make the tool rust-proof"], ans: "To increase wear resistance and maintain accuracy" },
            { q: "Which of the following is NOT a component of a micrometer caliper?", opts: ["L-shaped solid frame", "Spindle", "Anvil", "Thimble"], ans: "L-shaped solid frame" }
        ];

        let questions = [];
        let currentQuestion = 0;
        let score = 0;
        let userAnswers = [];

        // Fisher-Yates Shuffle
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function initQuiz() {
            // Clone and Shuffle Data
            let clonedData = JSON.parse(JSON.stringify(rawData));
            questions = shuffle(clonedData);
            
            questions.forEach(q => {
                q.opts = shuffle(q.opts);
            });

            userAnswers = new Array(questions.length).fill(null);
            score = 0;
            
            buildSidebar();
            loadQuestion(0);
        }

        function buildSidebar() {
            const grid = document.getElementById("nav-grid");
            grid.innerHTML = '';
            for (let i = 0; i < questions.length; i++) {
                const btn = document.createElement("button");
                btn.className = "nav-btn";
                btn.innerText = i + 1;
                btn.id = "nav-btn-" + i;
                btn.onclick = () => {
                    loadQuestion(i);
                    toggleSidebar(); // Close sidebar on mobile after clicking
                };
                grid.appendChild(btn);
            }
        }

        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("open");
        }

        function loadQuestion(index) {
            currentQuestion = index;
            const q = questions[currentQuestion];
            
            // Update Header
            document.getElementById("question-tracker").innerText = `Question ${currentQuestion + 1} of 100`;
            document.getElementById("score-tracker").innerText = `Score: ${score}`;
            document.getElementById("question-text").innerText = q.q;

            // Render Options
            const container = document.getElementById("options-container");
            container.innerHTML = '';

            q.opts.forEach((opt) => {
                const btn = document.createElement("button");
                btn.className = "option";
                btn.innerText = opt;
                
                // If already answered
                if (userAnswers[currentQuestion] !== null) {
                    btn.disabled = true;
                    if (opt === q.ans) {
                        btn.classList.add("correct");
                    } else if (opt === userAnswers[currentQuestion]) {
                        btn.classList.add("incorrect");
                    }
                } else {
                    btn.onclick = () => selectOption(opt);
                }
                
                container.appendChild(btn);
            });

            // Handle Next Button visibility
            const nextBtn = document.getElementById("next-btn");
            if (userAnswers[currentQuestion] !== null) {
                nextBtn.style.display = "block";
                nextBtn.innerText = (currentQuestion === questions.length - 1) ? "Finish Quiz ➔" : "Next Question ➔";
            } else {
                nextBtn.style.display = "none";
            }

            updateSidebarHighlight();
        }

        function selectOption(selectedOpt) {
            const q = questions[currentQuestion];
            userAnswers[currentQuestion] = selectedOpt;

            if (selectedOpt === q.ans) {
                score++;
                document.getElementById(`nav-btn-${currentQuestion}`).classList.add("answered-correct");
            } else {
                document.getElementById(`nav-btn-${currentQuestion}`).classList.add("answered-incorrect");
            }

            // Re-render to show colors and disable buttons
            loadQuestion(currentQuestion);
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                loadQuestion(currentQuestion + 1);
            } else {
                document.getElementById("quiz-screen").style.display = "none";
                const results = document.getElementById("results-screen");
                results.style.display = "block";
                document.getElementById("final-score").innerText = `You scored ${score} out of 100.`;
            }
        }

        function updateSidebarHighlight() {
            document.querySelectorAll(".nav-btn").forEach((btn, idx) => {
                btn.classList.remove("active");
                if (idx === currentQuestion) {
                    btn.classList.add("active");
                }
            });
        }

        window.onload = initQuiz;

    </script>
</body>
</html>
