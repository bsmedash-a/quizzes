<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviewer Notes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --glass-bg: rgba(255, 255, 255, 0.1); --glass-border: rgba(255, 255, 255, 0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1a2a6c, #11998e); background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            color: white; min-height: 100vh; padding: 2rem; overflow-x: hidden;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .back-btn {
            display: inline-block; background: var(--glass-bg); border: 1px solid var(--glass-border); color: white; padding: 10px 20px;
            border-radius: 30px; cursor: pointer; text-decoration: none; margin-bottom: 20px; transition: 0.3s; backdrop-filter: blur(10px);
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); transform: translateX(-5px); }
        .container { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }

        .blank-state { text-align: center; padding: 5rem 2rem; background: var(--glass-bg); border-radius: 20px; border: 1px dashed var(--glass-border); backdrop-filter: blur(10px); margin-top: 2rem; }
        .blank-state h2 { font-size: 2.5rem; margin-bottom: 1rem; color: #00d2ff; }
        .blank-state p { font-size: 1.2rem; color: #ccc; }
        @media (max-width: 768px) { body { padding: 1rem; } .blank-state h2 { font-size: 2rem; } }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back to Home</a>
        
        <div class="blank-state">
            <div style="font-size: 5rem; margin-bottom: 1rem;">🚧</div>
            <h2>Coming Soon</h2>
            <p>The reviewer notes for all subjects are currently being prepared.<br>Please check back later!</p>
        </div>
    </div>
</body>
</html>
