    </script>

    <script>
        const rawData = document.getElementById('raw-data').textContent.trim();
        const questions = rawData.split('\n').map(line => {
            const [num, text, a, b, c, d, ans] = line.split('|');
            return {
                num, text, options: [a, b, c, d], ansLetter: ans.toUpperCase().trim(), answered: null
            };
        });

        let currentIdx = 0;
        let score = 0;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function buildNav() {
            const grid = document.getElementById('navGrid');
            questions.forEach((q, i) => {
                const btn = document.createElement('button');
                btn.className = 'nav-item';
                btn.innerText = q.num;
                btn.id = `nav-${i}`;
                btn.onclick = () => { currentIdx = i; loadQuestion(); toggleSidebar(); };
                grid.appendChild(btn);
            });
        }

        function loadQuestion() {
            const q = questions[currentIdx];
            document.getElementById('qIdx').innerText = `Problem ${q.num} of 185`;
            document.getElementById('qText').innerText = q.text;
            
            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';
            
            const fb = document.getElementById('feedback');
            fb.className = 'feedback';
            fb.innerText = '';

            q.options.forEach((opt, i) => {
                const letter = String.fromCharCode(65 + i);
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="option-letter">${letter}</span> ${opt}`;
                
                if (q.answered) {
                    btn.disabled = true;
                    if (letter === q.ansLetter) btn.classList.add('correct');
                    if (letter === q.answered && letter !== q.ansLetter) btn.classList.add('wrong');
                } else {
                    btn.onclick = () => select(letter);
                }
                grid.appendChild(btn);
            });

            if (q.answered) {
                fb.classList.add('show', q.answered === q.ansLetter ? 'success' : 'error');
                fb.innerText = q.answered === q.ansLetter ? 'CORRECT!' : `WRONG! Correct Answer: ${q.ansLetter}`;
            }

            document.getElementById('prevBtn').disabled = currentIdx === 0;
            document.getElementById('nextBtn').disabled = currentIdx === questions.length - 1;
            
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(`nav-${currentIdx}`).classList.add('active');
        }

        function select(letter) {
            const q = questions[currentIdx];
            q.answered = letter;
            if (letter === q.ansLetter) {
                score++;
                document.getElementById('score').innerText = `Score: ${score}`;
            }
            document.getElementById(`nav-${currentIdx}`).classList.add('completed');
            loadQuestion();
        }

        function next() { if (currentIdx < questions.length - 1) { currentIdx++; loadQuestion(); } }
        function prev() { if (currentIdx > 0) { currentIdx--; loadQuestion(); } }

        window.onload = () => { buildNav(); loadQuestion(); };
    </script>
</body>
</html>
