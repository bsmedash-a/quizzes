        const blocks = rawText.split(/(?=\n\d+\.\s)/).map(b => b.trim()).filter(b => b);
        const quizData = [];

        // Parse Text
        blocks.forEach(block => {
            const qMatch = block.match(/^(\d+)\.\s([\s\S]*?)(?=A\.)/);
            if (!qMatch) return;
            
            const num = qMatch[1];
            const qText = qMatch[2].trim();
            
            const optionsStr = block.substring(qMatch[0].length);
            const optParts = optionsStr.split(/(?:^|\n)([A-D])\.\s/).filter(Boolean);
            
            const options = [];
            for (let i = 0; i < optParts.length; i += 2) {
                if (optParts[i] && optParts[i+1]) {
                    options.push({ letter: optParts[i].trim(), text: optParts[i+1].trim() });
                }
            }

            // Look up predefined solution or fallback
            const mapData = solutionMap[num] || { ans: "A", sol: "Calculation depends on standard Engineering principles or referenced Figure parameters." };
            
            // Map letter to index
            let ansIdx = 0;
            if (mapData.ans === "B") ansIdx = 1;
            if (mapData.ans === "C") ansIdx = 2;
            if (mapData.ans === "D") ansIdx = 3;

            quizData.push({
                num,
                q: qText,
                options,
                ansIdx,
                solText: mapData.sol,
                userAnswered: false
            });
        });

        // App State
        let currentIndex = 0;

        function initApp() {
            buildNav();
            loadQuestion(currentIndex);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function buildNav() {
            const grid = document.getElementById('navGrid');
            grid.innerHTML = '';
            quizData.forEach((q, idx) => {
                const btn = document.createElement('button');
                btn.className = 'nav-item';
                btn.id = `nav-btn-${idx}`;
                btn.innerText = q.num;
                btn.onclick = () => {
                    loadQuestion(idx);
                    toggleSidebar();
                };
                grid.appendChild(btn);
            });
        }

        function updateNavStyles() {
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`nav-btn-${currentIndex}`).classList.add('active');
            
            quizData.forEach((q, idx) => {
                const btn = document.getElementById(`nav-btn-${idx}`);
                if (q.userAnswered) btn.classList.add('completed');
            });
        }

        function loadQuestion(index) {
            currentIndex = index;
            const q = quizData[currentIndex];
            
            document.getElementById('qHeader').innerText = `Question ${q.num} of ${quizData.length}[cite: 8]`;
            document.getElementById('qText').innerHTML = q.q + "[cite: 8]";
            
            const optionsGrid = document.getElementById('optionsGrid');
            optionsGrid.innerHTML = '';
            
            const solContainer = document.getElementById('solutionContainer');
            solContainer.style.display = 'none';

            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="option-letter">${opt.letter}.</span> ${opt.text}`;
                
                if (q.userAnswered) {
                    btn.disabled = true;
                    if (i === q.ansIdx) btn.classList.add('correct');
                    else if (i === q.userSelectedIdx) btn.classList.add('wrong');
                } else {
                    btn.onclick = () => selectAnswer(i, btn);
                }
                
                optionsGrid.appendChild(btn);
            });

            if (q.userAnswered) {
                showSolution(q);
            }

            document.getElementById('prevBtn').disabled = (currentIndex === 0);
            document.getElementById('nextBtn').disabled = (currentIndex === quizData.length - 1);
            
            updateNavStyles();

            // Re-render LaTeX
            if (window.MathJax) {
                MathJax.typesetPromise([document.getElementById('quizCard')]);
            }
        }

        function selectAnswer(selectedIndex, selectedBtn) {
            const q = quizData[currentIndex];
            q.userAnswered = true;
            q.userSelectedIdx = selectedIndex;

            const buttons = document.getElementById('optionsGrid').children;
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].disabled = true;
                if (i === q.ansIdx) buttons[i].classList.add('correct');
            }

            if (selectedIndex !== q.ansIdx) {
                selectedBtn.classList.add('wrong');
            }

            showSolution(q);
            updateNavStyles();
        }

        function showSolution(q) {
            const solContainer = document.getElementById('solutionContainer');
            document.getElementById('solutionText').innerText = q.solText;
            solContainer.style.display = 'block';

            if (window.MathJax) {
                MathJax.typesetPromise([solContainer]);
            }
        }

        function nextQuestion() {
            if (currentIndex < quizData.length - 1) loadQuestion(currentIndex + 1);
        }

        function prevQuestion() {
            if (currentIndex > 0) loadQuestion(currentIndex - 1);
        }

        window.onload = initApp;
