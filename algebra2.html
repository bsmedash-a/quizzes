    <style>
        :root {
            --bg-color: #f4f7f6;
            --main-color: #ffffff;
            --text-color: #333333;
            --accent-color: #3498db;
            --hover-color: #2980b9;
            --correct-color: #2ecc71;
            --wrong-color: #e74c3c;
            --nav-bg: #2c3e50;
        }

          {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /  Sidebar Navigation  /
        #sidebar {
            width: 250px;
            background-color: var(--nav-bg);
            color: white;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            position: fixed;
            height: 100%;
            z-index: 1000;
            transform: translateX(-100%);
        }

        #sidebar.open {
            transform: translateX(0);
        }

        .sidebar-header {
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #1a252f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .nav-grid {
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            overflow-y: auto;
            flex: 1;
        }

        .nav-item {
            background-color: #34495e;
            color: white;
            border: none;
            padding: 10px 5px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background-color: var(--accent-color);
        }

        /  Main Content  /
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            transition: margin-left 0.3s ease;
        }

        .top-bar {
            background-color: var(--main-color);
            padding: 15px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
        }

        .hamburger {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--text-color);
            margin-right: 20px;
        }

        .quiz-container {
            flex: 1;
            padding: 40px 20px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
        }

        .quiz-card {
            background-color: var(--main-color);
            width: 100%;
            max-width: 700px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            height: fit-content;
        }

        .question-header {
            font-size: 1.1rem;
            color: #7f8c8d;
            margin-bottom: 15px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }

        .question-text {
            font-size: 1.25rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 15px 20px;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #e2e6ea;
            border-color: #dae0e5;
        }

        .option-btn.correct {
            background-color: #d4edda;
            border-color: var(--correct-color);
            color: #155724;
        }

        .option-btn.wrong {
            background-color: #f8d7da;
            border-color: var(--wrong-color);
            color: #721c24;
        }

        .option-btn:disabled {
            cursor: default;
        }

        .option-letter {
            font-weight: bold;
            margin-right: 15px;
            color: var(--accent-color);
        }

        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
        }

        .control-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .control-btn:hover {
            background-color: var(--hover-color);
        }

        .control-btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .feedback {
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            display: none;
        }

        /  Overlay for sidebar  /
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        #overlay.show { display: block; }
    </style>
</head>

    <!-- Quiz Logic -->
    <script>
        const rawText = document.getElementById('raw-data').textContent.trim();
        const blocks = rawText.split(/\n(?=\d+\.\s)/);
        const quizData = [];

        // Parse the raw text
        blocks.forEach(block => {
            const match = block.match(/^(\d+)\.\s+([\s\S] )$/);
            if (!match) return;
            
            const num = match[1];
            const content = match[2];
            
            // Find where options start (A. B. C. D.)
            const optStartMatch = content.match(/(?:^|\s)[A-D]\.\s/);
            let qText = content;
            let optsText = "";
            
            if (optStartMatch) {
                const splitIdx = content.indexOf(optStartMatch[0]);
                qText = content.substring(0, splitIdx).trim();
                optsText = content.substring(splitIdx).trim();
            }
            
            let options = [];
            let ansIdx = -1;
            
            if (optsText) {
                // Split by A., B., C., D.
                const optParts = optsText.split(/(?:^|\s)([A-D])\.\s+/).filter(Boolean);
                for (let i = 0; i < optParts.length; i += 2) {
                    let letter = optParts[i].trim();
                    let text = (optParts[i+1] || "").trim();
                    
                    if (text.includes(' ')) {
                        ansIdx = i / 2;
                        text = text.replace(/\ /g, '').trim();
                    }
                    options.push({ letter, text });
                }
            }
            
            quizData.push({ num, q: qText, options, ansIdx, userAnswered: false });
        });

        // Application State
        let currentIndex = 0;
        
        function initApp() {
            buildNav();
            loadQuestion(currentIndex);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function buildNav() {
            const grid = document.getElementById('navGrid');
            grid.innerHTML = '';
            quizData.forEach((q, idx) => {
                const btn = document.createElement('button');
                btn.className = 'nav-item';
                btn.id = `nav-btn-${idx}`;
                btn.innerText = q.num;
                btn.onclick = () => {
                    loadQuestion(idx);
                    toggleSidebar();
                };
                grid.appendChild(btn);
            });
        }

        function updateNavStyles() {
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`nav-btn-${currentIndex}`).classList.add('active');
        }

        function loadQuestion(index) {
            currentIndex = index;
            const q = quizData[currentIndex];
            
            document.getElementById('qHeader').innerText = `Problem ${q.num} of ${quizData[quizData.length-1].num}`;
            document.getElementById('qText').innerHTML = q.q;
            
            const optionsGrid = document.getElementById('optionsGrid');
            optionsGrid.innerHTML = '';
            
            const feedback = document.getElementById('feedback');
            feedback.style.display = 'none';

            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="option-letter">${opt.letter}.</span> ${opt.text}`;
                
                if (q.userAnswered) {
                    btn.disabled = true;
                    if (i === q.ansIdx) btn.classList.add('correct');
                    else if (i === q.userSelectedIdx) btn.classList.add('wrong');
                } else {
                    btn.onclick = () => selectAnswer(i, btn);
                }
                
                optionsGrid.appendChild(btn);
            });

            document.getElementById('prevBtn').disabled = (currentIndex === 0);
            document.getElementById('nextBtn').disabled = (currentIndex === quizData.length - 1);
            
            updateNavStyles();

            // Re-render LaTeX math formulas dynamically
            if (window.MathJax) {
                MathJax.typesetPromise([document.getElementById('quizCard')]);
            }
        }

        function selectAnswer(selectedIndex, selectedBtn) {
            const q = quizData[currentIndex];
            q.userAnswered = true;
            q.userSelectedIdx = selectedIndex;

            const buttons = document.getElementById('optionsGrid').children;
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].disabled = true;
                if (i === q.ansIdx) buttons[i].classList.add('correct');
            }

            const feedback = document.getElementById('feedback');
            if (selectedIndex === q.ansIdx) {
                feedback.innerText = "Correct!";
                feedback.style.color = "var(--correct-color)";
            } else {
                selectedBtn.classList.add('wrong');
                feedback.innerText = "Incorrect.";
                feedback.style.color = "var(--wrong-color)";
            }
            feedback.style.display = "block";
        }

        function nextQuestion() {
            if (currentIndex < quizData.length - 1) loadQuestion(currentIndex + 1);
        }

        function prevQuestion() {
            if (currentIndex > 0) loadQuestion(currentIndex - 1);
        }

        window.onload = initApp;
    </script>
</body>
