        .nav-item { background-color: #34495e; color: white; border: none; padding: 10px 0; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .nav-item.active { background-color: var(--accent-color); box-shadow: inset 0 0 0 2px white; }
        .nav-item.completed { background-color: var(--correct-color); color: white; }

        #main-content { flex: 1; margin-top: 60px; padding: 40px 20px; display: flex; justify-content: center; overflow-y: auto; }
        .quiz-card { background-color: var(--main-color); width: 100%; max-width: 850px; padding: 40px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); height: fit-content; margin-bottom: 40px; }

        .option-btn {
            background-color: #f8f9fa; border: 2px solid #dee2e6; padding: 16px 20px; border-radius: 6px;
            font-size: 1.1rem; cursor: pointer; text-align: left; transition: all 0.2s; display: flex; align-items: flex-start; color: #2c3e50;
        }
        .option-btn:hover:not(:disabled) { background-color: #f1f1f1; border-color: var(--accent-color); }
        .option-btn.correct { background-color: #e8f8f5; border-color: var(--correct-color); color: #27ae60; font-weight: bold; }
        .option-btn.wrong { background-color: #fdedec; border-color: var(--wrong-color); color: #c0392b; font-weight: bold; }
        .option-letter { font-weight: bold; margin-right: 15px; color: var(--accent-color); }

        .feedback-message { padding: 20px; border-radius: 6px; font-size: 1.2rem; line-height: 1.5; margin-bottom: 20px; display: none; text-align: center; }
        .feedback-message.success { background-color: #e8f8f5; color: #27ae60; border-left: 5px solid var(--correct-color); }

            const [num, text, a, b, c, d, ans] = line.split('|');
            return {
                num, text, options: [a, b, c, d], ansLetter: ans.trim(), answered: null
            };
        });

        let currentIdx = 0;
        let score = 0;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function buildNav() {
            const grid = document.getElementById('navGrid');
            quizData.forEach((q, i) => {
                const btn = document.createElement('button');
                btn.className = 'nav-item';
                btn.innerText = q.num;
                btn.id = `nav-${i}`;
                btn.onclick = () => { currentIdx = i; loadQuestion(); toggleSidebar(); };
                grid.appendChild(btn);
            });
        }

        function loadQuestion() {
            const q = quizData[currentIdx];
            document.getElementById('qHeader').innerText = `Problem ${q.num} of ${quizData.length}`;
            document.getElementById('qText').innerText = q.text;
            
            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';
            
            const fb = document.getElementById('feedbackMessage');
            fb.style.display = 'none';

            q.options.forEach((opt, i) => {
                const letter = String.fromCharCode(65 + i);
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="option-letter">${letter}</span> ${opt}`;
                
                if (q.answered) {
                    btn.disabled = true;
                    if (letter === q.ansLetter) btn.classList.add('correct');
                    if (letter === q.answered && letter !== q.ansLetter) btn.classList.add('wrong');
                } else {
                    btn.onclick = () => select(letter);
                }
                grid.appendChild(btn);
            });

            if (q.answered) {
                fb.style.display = 'block';
                fb.className = `feedback-message ${q.answered === q.ansLetter ? 'success' : 'error'}`;
                fb.innerText = q.answered === q.ansLetter ? 'CORRECT!' : `WRONG! Correct Answer: ${q.ansLetter}`;
            }

            document.getElementById('prevBtn').disabled = currentIdx === 0;
            document.getElementById('nextBtn').disabled = currentIdx === quizData.length - 1;
            
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(`nav-${currentIdx}`).classList.add('active');

            if (window.MathJax) MathJax.typesetPromise();
        }

        function select(letter) {
            const q = quizData[currentIdx];
            q.answered = letter;
            if (letter === q.ansLetter) {
                score++;
                document.getElementById('scoreTracker').innerText = `Score: ${score}`;
            }
            document.getElementById(`nav-${currentIdx}`).classList.add('completed');
            loadQuestion();
        }

        function next() { if (currentIdx < quizData.length - 1) { currentIdx++; loadQuestion(); } }
        function prev() { if (currentIdx > 0) { currentIdx--; loadQuestion(); } }

        window.onload = () => { buildNav(); loadQuestion(); document.getElementById('controls').style.display='flex'; };
    </script>
</body>
</html>
